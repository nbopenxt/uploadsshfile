# 项目级 Gradle 配置

# 指定 Gradle 9.4.1 本地路径
# org.gradle.home=  (removed - user-specific)

# 指定 JDK 21 路径（不影响全局 JAVA_HOME）
# org.gradle.java.home=  (removed - set JAVA_HOME)

# Gradle 守护进程配置
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# 禁用配置缓存 - 避免文件系统竞争问题
org.gradle.configuration-cache=false
